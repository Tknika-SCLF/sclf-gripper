; SCLF Gripper — PlatformIO Configuration
; Board: STM32G474CEU6 | Framework: Arduino (STM32duino)
; Upload via ST-Link (SWD pads: PA13/DIO, PA14/CLK, PG10/RST)

; ==========================================================
; Entorno Base (Configuración compartida y configuraciones generales)
; ==========================================================
[env]
platform = ststm32
board = nucleo_g474re
framework = arduino

; MCU clock
board_build.mcu = stm32g474ceux
board_build.f_cpu = 170000000L

; Upload via STM32CubeProgrammer (instalar desde st.com/stm32cubeprog)
upload_protocol = custom
upload_command = "C:/Program Files/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin/STM32_Programmer_CLI.exe" -c port=SWD -w $SOURCE 0x08000000 -v -rst

; Debug via ST-Link / SWD
debug_tool = stlink

; Serial monitor (USB VCP)
monitor_speed = 115200
monitor_port = COM6

; SimpleFOC library
lib_deps =
    SimpleFOC=https://github.com/simplefoc/Arduino-FOC.git#v2.3.3
lib_archive = false
lib_ldf_mode = deep+

; STM32 HAL modules needed
build_flags =
    -D HSE_VALUE=16000000U
    -Wl,-u,_printf_float
    -I src
    -DHAL_TIM_MODULE_ENABLED
    -I.pio/libdeps/SCLF_Gripper/SimpleFOC/src
    -DHAL_HRTIM_MODULE_ENABLED
    -DHAL_SPI_MODULE_ENABLED
    -DHAL_I2C_MODULE_ENABLED
    -DHAL_UART_MODULE_ENABLED
    -DHAL_ADC_MODULE_ENABLED
    -DHAL_DMA_MODULE_ENABLED
    -DHAL_CORDIC_MODULE_ENABLED
    -DUSE_FULL_LL_DRIVER
    ; USB CDC habilitado:
    -DUSBCON
    -DUSBD_USE_CDC
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -DHAL_PCD_MODULE_ENABLED
    -DSIMPLEFOC_DEBUG_ENABLE


; ==========================================================
; ENTORNOS DE PRUEBA INDIVIDUALES (Selecciona uno en VSCode para compilar)
; Cada entorno mantiene su propia caché para compilar en segundos en vez de minutos.
; ==========================================================

[env:test_led_heartbeat]
build_src_filter = +<../examples/phase0_led_heartbeat/>

[env:test_mt6701]
build_src_filter = +<../examples/phase1_1_mt6701_test/> +<encoder/>

[env:test_drv_spi]
build_src_filter = +<../examples/phase1_2_drv_spi/> +<motor/>

[env:test_open_loop]
build_src_filter = +<../examples/phase1_3_open_loop_v_control/> +<motor/> +<encoder/>

[env:test_rs485_ping]
build_src_filter = +<../examples/phase1_4_rs485_ping/> +<comms/>

[env:test_rs485_protocol]
build_src_filter = +<../examples/phase3_1_rs485_basic/> +<comms/>

[env:test_rs485_control]
build_src_filter = +<../examples/phase3_2_rs485_control/> +<comms/>

[env:test_gripper_kinematics]
build_src_filter = +<../examples/phase7_gripper_kinematics/> +<kinematics/>

[env:test_current_sense]
build_src_filter = +<../examples/phase1_5_current_sense/> +<motor/>

[env:test_foc_open_loop]
build_src_filter = +<../examples/phase2_1_foc_open_loop/> +<motor/> +<encoder/>

[env:test_foc_closed_loop]
build_src_filter = +<../examples/phase2_2_foc_closed_loop/> +<motor/> +<encoder/>

[env:test_usb_vcp]
build_src_filter = +<../examples/phase4_USB_VCP/> +<motor/> +<encoder/> +<comms/>

[env:test_fault_manager]
build_src_filter = +<../examples/phase5_fault_manager/> +<motor/> +<encoder/> +<comms/> +<faults/>

[env:test_persistence]
build_src_filter = +<../examples/phase6_persistence/> +<motor/> +<encoder/> +<comms/> +<faults/> +<config/>

[env:SCLF_Gripper_Main]
build_src_filter = +<*>
