; SCLF Gripper v1.0 — PlatformIO Configuration
; Board: STM32G474CEU6 | Framework: Arduino (STM32duino)
; Upload via ST-Link (SWD pads: PA13/DIO, PA14/CLK, PG10/RST)

[env:SCLF_Gripper]
platform = ststm32
board = nucleo_g474re
framework = arduino

; MCU clock
board_build.mcu = stm32g474ceux
board_build.f_cpu = 170000000L

; Upload & debug via ST-Link / SWD
upload_protocol = stlink
debug_tool = stlink
; debug_server_arguments = -f interface/stlink.cfg -c "transport select hla_swd" -f target/stm32g4x.cfg -c "reset_config srst_only"

; Serial monitor (USB VCP)
monitor_speed = 115200
monitor_port = /dev/ttyACM0   ; Change to COMx on Windows

; SimpleFOC library
lib_deps =
    SimpleFOC=https://github.com/simplefoc/Arduino-FOC.git#v2.3.3
lib_archive = false
lib_ldf_mode = deep+

; STM32 HAL modules needed
build_flags =
    -DHAL_TIM_MODULE_ENABLED
    -DHAL_HRTIM_MODULE_ENABLED
    -DHAL_SPI_MODULE_ENABLED
    -DHAL_I2C_MODULE_ENABLED
    -DHAL_UART_MODULE_ENABLED
    -DHAL_ADC_MODULE_ENABLED
    -DHAL_DMA_MODULE_ENABLED
    -DHAL_CORDIC_MODULE_ENABLED
    -DUSE_FULL_LL_DRIVER
    ; Uncomment for verbose SimpleFOC debug output over VCP:
    ; -DSIMPLEFOC_DEBUG_ENABLE

; DFU bootloader upload (alternative — hold BOOT button + reset, then:)
; upload_protocol = dfu

; Optional: custom linker script if using CCM RAM
; board_build.ldscript = STM32G474CE_FLASH.ld
