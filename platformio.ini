; SCLF Gripper v1.0 — PlatformIO Configuration
; Board: STM32G474CEU6 | Framework: Arduino (STM32duino)
; Upload via ST-Link (SWD pads: PA13/DIO, PA14/CLK, PG10/RST)

; [platformio]
; core_dir = C:/Users/Public/.pio_core
; libdeps_dir = C:/Users/Public/.pio_core/libdeps
; build_dir = C:/Users/Public/.pio_core/build
[env:SCLF_Gripper]
platform = ststm32
board = nucleo_g474re
framework = arduino

; MCU clock
board_build.mcu = stm32g474ceux
board_build.f_cpu = 170000000L

; ==========================================================
; EJEMPLOS DISPONIBLES (Descomentar el que se quiera flashear)
; ==========================================================
;build_src_filter = +<../examples/fase0_led_heartbeat/>
;build_src_filter = +<../examples/fase1_1_mt6701_test/> +<encoder/>
build_src_filter = +<../examples/fase1_4_rs485_ping/> +<comms/>
;build_src_filter = +<*>  ; (Para la versión final que incluye todo)

; Upload via OpenOCD / ST-Link (bypasses PIO registry download issues)
; upload_protocol = custom
; upload_command = "C:/Program Files/STMicroelectronics/STM32Cube/STM32CubeProgrammer/bin/STM32_Programmer_CLI.exe" -c port=SWD -w $SOURCE 0x08000000 -v -rst

; Debug via ST-Link / SWD
debug_tool = stlink

; Original stlink upload (requires tool-openocd from PIO registry):
upload_protocol = stlink

; Serial monitor (USB VCP)
monitor_speed = 115200

; SimpleFOC library
lib_deps =
    SimpleFOC=https://github.com/simplefoc/Arduino-FOC.git#v2.3.3
lib_archive = false
lib_ldf_mode = deep+

; STM32 HAL modules needed
build_flags =
    -I src
    -DHAL_TIM_MODULE_ENABLED
    -I.pio/libdeps/SCLF_Gripper/SimpleFOC/src
    -DHAL_HRTIM_MODULE_ENABLED
    -DHAL_SPI_MODULE_ENABLED
    -DHAL_I2C_MODULE_ENABLED
    -DHAL_UART_MODULE_ENABLED
    -DHAL_ADC_MODULE_ENABLED
    -DHAL_DMA_MODULE_ENABLED
    -DHAL_CORDIC_MODULE_ENABLED
    -DUSE_FULL_LL_DRIVER
    ; USB CDC habilitado:
    -DUSBCON
    -DUSBD_USE_CDC
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -DHAL_PCD_MODULE_ENABLED
    ; -DSIMPLEFOC_DEBUG_ENABLE

; DFU bootloader upload (alternative — hold BOOT button + reset, then:)
; upload_protocol = dfu

; Optional: custom linker script if using CCM RAM
; board_build.ldscript = STM32G474CE_FLASH.ld
